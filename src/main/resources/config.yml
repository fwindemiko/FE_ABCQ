# FE_ABCQ Configuration File
# 知识问答插件配置

# 周期提问设置
question:
  # 是否启用周期提问
  enabled: true
  # 提问间隔（秒）
  interval: 897
  # 最少在线人数才触发提问（默认4人）
  min_players: 4

# 答对效果设置
effects:
  # 启用粒子效果
  particles: true
  # 启用烟花效果
  fireworks: true
  # 启用声音效果
  sounds: true

# 奖励设置
rewards:
  # 经验奖励
  experience: 10
  # 命令奖励（会在玩家答对时执行）
  commands:
    - "money give {player} 500"
    - "points give {player} 5"
    - "xp add {player} 2 levels"
  # 禁用奖励（设置为0或空列表则无奖励）
  disabled: false

